repos = [

  # ================= Backend =================
  {
    repo = "local",
    hooks = [
      {
        id = "ruff-check",
        name = "ruff check",
        entry = "powershell -Command \"cd backend; uv run ruff check --fix .\"",
        language = "system",
        files = "^backend/.*\\.py$",
        pass_filenames = false
      },
      {
        id = "ruff-format",
        name = "ruff format",
        entry = "powershell -Command \"cd backend; uv run ruff format .\"",
        language = "system",
        files = "^backend/.*\\.py$",
        pass_filenames = false
      },
      {
        id = "uv-sort",
        name = "uv sort dependencies",
        entry = "uv run --directory backend uv-sort",
        files = "^backend/pyproject\\.toml$",
        pass_filenames = false,
        language = "system"
      }
    ]
  },

  # ================= Security =================
  {
    repo = "local",
    hooks = [
      {
        id = "detect-secrets",
        name = "detect-secrets",
        entry = "uv run --directory backend detect-secrets-hook",
        language = "system",
        pass_filenames = true
      }
    ]
  },

  # ================= Frontend =================
  {
    repo = "local",
    hooks = [
      {
        id = "eslint",
        name = "eslint",
        entry = "npx --prefix frontend eslint",
        language = "system",
        pass_filenames = true,
        files = "^frontend/.*\\.(js|ts|tsx)$"
      },
      {
        id = "prettier",
        name = "prettier format",
        entry = "npx --prefix frontend prettier --write",
        language = "system",
        pass_filenames = true,
        files = "^frontend/.*\\.(js|ts|tsx|css|json|md)$"
      }
    ]
  }
]